<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EE;
    --bg2: #EDE9E0;
    --ink: #1C1A16;
    --ink2: #6B6558;
    --ink3: #A09890;
    --gold: #8B6F3E;
    --gold-light: #C9A96E;
    --line: #D4CEBC;
    --green: #3A6B4A;
    --red: #7A3030;
  }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  #app {
    width: 100%;
    max-width: 620px;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.5rem;
  }

  .header-title {
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--ink2);
    font-style: italic;
  }

  .progress-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s ease forwards;
  }

  .progress-pip {
    width: 28px;
    height: 3px;
    border-radius: 2px;
    background: var(--line);
    transition: background 0.4s ease;
  }
  .progress-pip.active { background: var(--gold); }
  .progress-pip.done { background: var(--gold-light); }

  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2.5rem 2.5rem 2rem;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
  }

  .node-type-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1.25rem;
  }

  .node-text {
    font-size: 1.35rem;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 2rem;
    font-weight: 400;
  }

  .node-text.reflection-text {
    font-style: italic;
    font-size: 1.25rem;
    color: var(--ink2);
    border-left: 2px solid var(--gold-light);
    padding-left: 1.25rem;
  }

  .node-text.start-text {
    font-size: 1.5rem;
    text-align: center;
    color: var(--ink);
    border: none;
    padding: 0;
    margin-bottom: 1.5rem;
  }

  .node-text.summary-text {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--ink2);
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .option-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.9rem 1.1rem;
    font-family: 'EB Garamond', serif;
    font-size: 1.1rem;
    color: var(--ink2);
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    line-height: 1.45;
  }

  .option-btn:hover {
    border-color: var(--gold);
    color: var(--ink);
    background: var(--bg);
  }

  .option-btn.selected {
    border-color: var(--gold);
    background: #FAF6EE;
    color: var(--ink);
  }

  .continue-btn {
    margin-top: 1.5rem;
    background: none;
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 0.7rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
  }

  .continue-btn:hover {
    background: var(--gold);
    color: white;
  }

  .axis-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .axis-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold-light);
  }

  .axis-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .summary-section {
    margin-bottom: 1.5rem;
  }

  .summary-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink3);
    margin-bottom: 0.25rem;
    letter-spacing: 0.05em;
  }

  .summary-value {
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }

  .summary-insight {
    font-size: 1.2rem;
    font-style: italic;
    line-height: 1.7;
    color: var(--ink2);
    border-top: 1px solid var(--line);
    padding-top: 1.25rem;
    margin-top: 1.25rem;
  }

  .end-screen {
    text-align: center;
    padding: 2rem 0;
  }

  .end-screen .big-text {
    font-size: 2rem;
    color: var(--ink2);
    font-style: italic;
    margin-bottom: 1rem;
  }

  .end-screen .date-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.1em;
  }

  .signal-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 1.25rem;
  }

  .signal-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .tag-green { background: #E8F3EC; color: var(--green); }
  .tag-amber { background: #F5EDE0; color: var(--gold); }
  .tag-neutral { background: var(--bg2); color: var(--ink2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-out {
    animation: fadeOut 0.3s ease forwards;
  }

  @keyframes fadeOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-8px); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-label">End of Day</div>
    <div class="header-title">Daily Reflection</div>
  </div>
  <div class="progress-bar" id="progressBar"></div>
  <div id="nodeContainer"></div>
</div>

<script>
const TREE_DATA = {"meta":{"version":"1.0","title":"The Daily Reflection Tree","description":"A deterministic end-of-day reflection tool across three psychological axes: Locus (Victim vs Victor), Orientation (Contribution vs Entitlement), and Radius (Self-Centric vs Altrocentric).","axes":["axis1_locus","axis2_orientation","axis3_radius"]},"nodes":[{"id":"START","parentId":null,"type":"start","text":"Good evening. Before the day closes, let's spend a few minutes with it. No right answers — just honest ones.","options":[],"target":"A1_OPEN","signal":null},{"id":"A1_OPEN","parentId":"START","type":"question","text":"If today were a weather report, what would it be?","options":["Stormy — things kept going wrong","Overcast — nothing terrible, nothing great","Partly cloudy — mixed, but I managed","Clear — I felt on top of things"],"target":null,"signal":null},{"id":"A1_D1","parentId":"A1_OPEN","type":"decision","text":null,"options":["answer=Stormy — things kept going wrong:A1_Q_HARD","answer=Overcast — nothing terrible, nothing great:A1_Q_DRIFT","answer=Partly cloudy — mixed, but I managed:A1_Q_NAVIGATE","answer=Clear — I felt on top of things:A1_Q_AGENCY_HIGH"],"target":null,"signal":null},{"id":"A1_Q_HARD","parentId":"A1_D1","type":"question","text":"You said it was stormy. When something went sideways today, what was your first instinct?","options":["Look for what I could still control","Feel frustrated — this shouldn't be happening","Figure out who dropped the ball","Push through it alone, even if it hurt"],"target":null,"signal":"axis1:external"},{"id":"A1_Q_DRIFT","parentId":"A1_D1","type":"question","text":"Overcast days can be deceptive — nothing dramatic, but were you steering, or just drifting?","options":["I steered — I made deliberate choices","I drifted — just got through it","I avoided something I should have faced","I showed up but didn't fully engage"],"target":null,"signal":"axis1:external"},{"id":"A1_Q_NAVIGATE","parentId":"A1_D1","type":"question","text":"Mixed days have decision points. When the clouds came in, what did you do?","options":["I found a different route","I waited to see if things cleared up","I asked for help and kept moving","I complained but eventually adapted"],"target":null,"signal":"axis1:internal"},{"id":"A1_Q_AGENCY_HIGH","parentId":"A1_D1","type":"question","text":"A clear day — what made it clear? When something went well today, what was the main reason?","options":["I prepared well or made a good call","The team came through","Things just lined up — I got lucky","I adapted fast when it mattered"],"target":null,"signal":"axis1:internal"},{"id":"A1_D2","parentId":null,"type":"decision","text":null,"options":["parent=A1_Q_HARD,answer=Look for what I could still control:A1_R_PIVOT","parent=A1_Q_HARD,answer=Feel frustrated — this shouldn't be happening:A1_R_EXT_STRONG","parent=A1_Q_HARD,answer=Figure out who dropped the ball:A1_R_EXT_STRONG","parent=A1_Q_HARD,answer=Push through it alone, even if it hurt:A1_R_STOIC","parent=A1_Q_DRIFT,answer=I steered — I made deliberate choices:A1_R_SUBTLE_AGENCY","parent=A1_Q_DRIFT,answer=I drifted — just got through it:A1_R_EXT_GENTLE","parent=A1_Q_DRIFT,answer=I avoided something I should have faced:A1_R_AVOIDANCE","parent=A1_Q_DRIFT,answer=I showed up but didn't fully engage:A1_R_EXT_GENTLE","parent=A1_Q_NAVIGATE,answer=I found a different route:A1_R_INT_STRONG","parent=A1_Q_NAVIGATE,answer=I waited to see if things cleared up:A1_R_EXT_GENTLE","parent=A1_Q_NAVIGATE,answer=I asked for help and kept moving:A1_R_INT_STRONG","parent=A1_Q_NAVIGATE,answer=I complained but eventually adapted:A1_R_STOIC","parent=A1_Q_AGENCY_HIGH,answer=I prepared well or made a good call:A1_R_INT_STRONG","parent=A1_Q_AGENCY_HIGH,answer=The team came through:A1_R_INT_STRONG","parent=A1_Q_AGENCY_HIGH,answer=Things just lined up — I got lucky:A1_R_EXT_GENTLE","parent=A1_Q_AGENCY_HIGH,answer=I adapted fast when it mattered:A1_R_INT_STRONG"],"target":null,"signal":null},{"id":"A1_R_INT_STRONG","parentId":"A1_D2","type":"reflection","text":"You stayed in the driver's seat today — not because everything went perfectly, but because you kept looking for what you could do. That's not something that happens to you. That's something you chose.","options":[],"target":"BRIDGE_1_2","signal":"axis1:internal"},{"id":"A1_R_EXT_STRONG","parentId":"A1_D2","type":"reflection","text":"When things go wrong, the mind looks outward first — for explanations, for someone to hold accountable. That's human. But in the middle of all that, there was at least one moment where you had a choice. It might have been small. What was it?","options":[],"target":"BRIDGE_1_2","signal":"axis1:external"},{"id":"A1_R_EXT_GENTLE","parentId":"A1_D2","type":"reflection","text":"Some days, the current carries us. That's fine — you can't be intentional every hour. But notice: even in a drifting day, you made calls. You chose what to respond to, what to let go. Agency doesn't have to be loud.","options":[],"target":"BRIDGE_1_2","signal":"axis1:external"},{"id":"A1_R_PIVOT","parentId":"A1_D2","type":"reflection","text":"Something hard hit you today — and your first move was to look for what you still controlled. That's not a small thing. That instinct is the whole game.","options":[],"target":"BRIDGE_1_2","signal":"axis1:internal"},{"id":"A1_R_STOIC","parentId":"A1_D2","type":"reflection","text":"You pushed through — and there's real grit in that. Worth noticing, though: pushing through alone and navigating intelligently are different moves. One costs more. Both can be right, depending on the situation.","options":[],"target":"BRIDGE_1_2","signal":"axis1:internal"},{"id":"A1_R_SUBTLE_AGENCY","parentId":"A1_D2","type":"reflection","text":"You called it overcast, but you steered. There's something quiet and underrated about a day where you made deliberate choices without drama. That's a kind of mastery.","options":[],"target":"BRIDGE_1_2","signal":"axis1:internal"},{"id":"A1_R_AVOIDANCE","parentId":"A1_D2","type":"reflection","text":"You noticed the avoidance — which is itself a form of agency. Knowing you sidestepped something is the first step toward deciding whether to go back for it.","options":[],"target":"BRIDGE_1_2","signal":"axis1:external"},{"id":"BRIDGE_1_2","parentId":null,"type":"bridge","text":"Now let's shift lenses. From how you handled things — to what you gave.","options":[],"target":"A2_OPEN","signal":null},{"id":"A2_OPEN","parentId":"BRIDGE_1_2","type":"question","text":"Think about one interaction you had today — with a colleague, a manager, a report. Which of these comes closest to what happened?","options":["I helped someone who didn't ask me to","I did what was expected, nothing more","I felt like my effort wasn't recognized","I went beyond my role to move something forward"],"target":null,"signal":null},{"id":"A2_D1","parentId":"A2_OPEN","type":"decision","text":null,"options":["answer=I helped someone who didn't ask me to:A2_Q_CONTRIB_HIGH","answer=I did what was expected, nothing more:A2_Q_NEUTRAL","answer=I felt like my effort wasn't recognized:A2_Q_ENTITLEMENT","answer=I went beyond my role to move something forward:A2_Q_CONTRIB_HIGH"],"target":null,"signal":null},{"id":"A2_Q_CONTRIB_HIGH","parentId":"A2_D1","type":"question","text":"You gave something extra today. When you did that, what was driving it?","options":["I wanted to — it felt right","I hoped it would be noticed","It needed doing and I was there","I wanted that person to succeed"],"target":null,"signal":"axis2:contribution"},{"id":"A2_Q_NEUTRAL","parentId":"A2_D1","type":"question","text":"You met the bar — which is real. But was there a moment today where you could have given more and chose not to?","options":["Yes — I held back deliberately","Yes — I was too depleted to give more","No — I genuinely gave all I had","I didn't see an opportunity to do more"],"target":null,"signal":"axis2:contribution"},{"id":"A2_Q_ENTITLEMENT","parentId":"A2_D1","type":"question","text":"The recognition gap stings. When you think about what you gave today versus what came back — be honest: what were you hoping for?","options":["A thank-you or acknowledgment","Credit for something I initiated","To be included in the decision","Nothing specific — it just felt unbalanced"],"target":null,"signal":"axis2:entitlement"},{"id":"A2_D2","parentId":null,"type":"decision","text":null,"options":["parent=A2_Q_CONTRIB_HIGH,answer=I wanted to — it felt right:A2_R_CONTRIB_PURE","parent=A2_Q_CONTRIB_HIGH,answer=I hoped it would be noticed:A2_R_CONTRIB_MIXED","parent=A2_Q_CONTRIB_HIGH,answer=It needed doing and I was there:A2_R_CONTRIB_PURE","parent=A2_Q_CONTRIB_HIGH,answer=I wanted that person to succeed:A2_R_CONTRIB_PURE","parent=A2_Q_NEUTRAL,answer=Yes — I held back deliberately:A2_R_CONSERVATION","parent=A2_Q_NEUTRAL,answer=Yes — I was too depleted to give more:A2_R_DEPLETION","parent=A2_Q_NEUTRAL,answer=No — I genuinely gave all I had:A2_R_CONTRIB_PURE","parent=A2_Q_NEUTRAL,answer=I didn't see an opportunity to do more:A2_R_CONTRIB_PURE","parent=A2_Q_ENTITLEMENT,answer=A thank-you or acknowledgment:A2_R_ENT_GENTLE","parent=A2_Q_ENTITLEMENT,answer=Credit for something I initiated:A2_R_ENT_MODERATE","parent=A2_Q_ENTITLEMENT,answer=To be included in the decision:A2_R_ENT_GENTLE","parent=A2_Q_ENTITLEMENT,answer=Nothing specific — it just felt unbalanced:A2_R_ENT_GENTLE"],"target":null,"signal":null},{"id":"A2_R_CONTRIB_PURE","parentId":"A2_D2","type":"reflection","text":"You gave because you wanted to — not because you were keeping score. That's contribution at its cleanest. It's also rare. Most people's generosity at work has a quiet ledger running underneath it.","options":[],"target":"BRIDGE_2_3","signal":"axis2:contribution"},{"id":"A2_R_CONTRIB_MIXED","parentId":"A2_D2","type":"reflection","text":"You gave extra today, and you also wanted it to land. That's not a flaw — wanting to matter is human. Worth noticing, though: the giving happened regardless of whether the recognition did. That's worth something.","options":[],"target":"BRIDGE_2_3","signal":"axis2:contribution"},{"id":"A2_R_ENT_GENTLE","parentId":"A2_D2","type":"reflection","text":"The recognition question is interesting. Sometimes what looks like entitlement is really just a legitimate need for feedback — to know the work landed. Before writing off the feeling, ask: is this about deserving, or about knowing you made a difference?","options":[],"target":"BRIDGE_2_3","signal":"axis2:entitlement"},{"id":"A2_R_ENT_MODERATE","parentId":"A2_D2","type":"reflection","text":"Credit matters — especially when you took the initiative. But there's a difference between 'I want to know this was seen' and 'I need to be acknowledged to feel okay about my work.' The first is healthy. The second is worth watching.","options":[],"target":"BRIDGE_2_3","signal":"axis2:entitlement"},{"id":"A2_R_CONSERVATION","parentId":"A2_D2","type":"reflection","text":"You had more to give and you chose not to. That could be self-protection, or it could be a quiet way of withdrawing. Only you know which. Both are okay — but it's worth naming which one it was.","options":[],"target":"BRIDGE_2_3","signal":"axis2:entitlement"},{"id":"A2_R_DEPLETION","parentId":"A2_D2","type":"reflection","text":"Running on empty isn't a character flaw — it's information. You gave what you had. A depleted day isn't a selfish day. Take note of what drained you, because that's what needs attention.","options":[],"target":"BRIDGE_2_3","signal":"axis2:contribution"},{"id":"BRIDGE_2_3","parentId":null,"type":"bridge","text":"One more shift. From what you gave — to who you were thinking about.","options":[],"target":"A3_OPEN","signal":null},{"id":"A3_OPEN","parentId":"BRIDGE_2_3","type":"question","text":"When you think about today's biggest challenge or moment — who was in the frame?","options":["Just me — it was my problem, my stress","Me and one other person — a specific colleague","My whole team — we were all in it","The person or people we ultimately serve"],"target":null,"signal":null},{"id":"A3_D1","parentId":"A3_OPEN","type":"decision","text":null,"options":["answer=Just me — it was my problem, my stress:A3_Q_SELF","answer=Me and one other person — a specific colleague:A3_Q_DYADIC","answer=My whole team — we were all in it:A3_Q_TEAM","answer=The person or people we ultimately serve:A3_Q_BEYOND"],"target":null,"signal":null},{"id":"A3_Q_SELF","parentId":"A3_D1","type":"question","text":"You were in the frame alone. Was anyone else affected by what you were going through — even if you weren't thinking about them in the moment?","options":["Probably yes, but I didn't have bandwidth to notice","No — this was genuinely just about me","Yes, and I felt guilty about that","Yes — and I tried to protect them from it"],"target":null,"signal":"axis3:self"},{"id":"A3_Q_DYADIC","parentId":"A3_D1","type":"question","text":"You had one specific person in mind. What were you feeling toward them?","options":["Concern — I was thinking about how they were doing","Frustration — they were part of the problem","Gratitude — they helped me get through it","Responsibility — I needed to make sure they were okay"],"target":null,"signal":"axis3:altrocentric"},{"id":"A3_Q_TEAM","parentId":"A3_D1","type":"question","text":"The whole team was in it together. In that shared struggle, where did your attention tend to go?","options":["My own contribution — did I pull my weight?","The weakest link — who needed more support?","The goal — are we going to get there?","The dynamic — how is this affecting us as a unit?"],"target":null,"signal":"axis3:altrocentric"},{"id":"A3_Q_BEYOND","parentId":"A3_D1","type":"question","text":"You kept the end user or customer in mind — that's rare. What does that mean to how you approach your work?","options":["It grounds me — when internal stuff gets heavy, it refocuses me","It's just how I think — I don't know any other way","It's something I'm working toward — I'm getting better at it","Today was unusual — I don't usually think that broadly"],"target":null,"signal":"axis3:altrocentric"},{"id":"A3_D2","parentId":null,"type":"decision","text":null,"options":["parent=A3_Q_SELF,answer=Probably yes, but I didn't have bandwidth to notice:A3_R_SELF_AWARE","parent=A3_Q_SELF,answer=No — this was genuinely just about me:A3_R_SELF_PURE","parent=A3_Q_SELF,answer=Yes, and I felt guilty about that:A3_R_SELF_GUILT","parent=A3_Q_SELF,answer=Yes — and I tried to protect them from it:A3_R_SELF_PROTECT","parent=A3_Q_DYADIC,answer=Concern — I was thinking about how they were doing:A3_R_ALTRO_HIGH","parent=A3_Q_DYADIC,answer=Frustration — they were part of the problem:A3_R_ALTRO_FRICTION","parent=A3_Q_DYADIC,answer=Gratitude — they helped me get through it:A3_R_ALTRO_HIGH","parent=A3_Q_DYADIC,answer=Responsibility — I needed to make sure they were okay:A3_R_ALTRO_HIGH","parent=A3_Q_TEAM,answer=My own contribution — did I pull my weight?:A3_R_SELF_AWARE","parent=A3_Q_TEAM,answer=The weakest link — who needed more support?:A3_R_ALTRO_HIGH","parent=A3_Q_TEAM,answer=The goal — are we going to get there?:A3_R_ALTRO_HIGH","parent=A3_Q_TEAM,answer=The dynamic — how is this affecting us as a unit?:A3_R_ALTRO_HIGH","parent=A3_Q_BEYOND,answer=It grounds me — when internal stuff gets heavy, it refocuses me:A3_R_TRANSCEND","parent=A3_Q_BEYOND,answer=It's just how I think — I don't know any other way:A3_R_TRANSCEND","parent=A3_Q_BEYOND,answer=It's something I'm working toward — I'm getting better at it:A3_R_ALTRO_HIGH","parent=A3_Q_BEYOND,answer=Today was unusual — I don't usually think that broadly:A3_R_SELF_AWARE"],"target":null,"signal":null},{"id":"A3_R_SELF_PURE","parentId":"A3_D2","type":"reflection","text":"Sometimes a challenge really is just yours — that's not selfishness, that's honest. No one has an unlimited radius of concern. But it's worth asking tomorrow: is there one person in my orbit I could notice more?","options":[],"target":"SUMMARY","signal":"axis3:self"},{"id":"A3_R_SELF_AWARE","parentId":"A3_D2","type":"reflection","text":"You were narrowly focused — and you know it. That self-awareness is the opening. The bandwidth to notice others doesn't come from having an easy day; it comes from practice. Even one small glance outward changes the texture of a hard day.","options":[],"target":"SUMMARY","signal":"axis3:self"},{"id":"A3_R_SELF_GUILT","parentId":"A3_D2","type":"reflection","text":"Guilt about self-focus is itself a form of other-awareness — you noticed. But guilt isn't the goal. Try something lighter: curiosity. Next time you're in a hard moment, just ask once: how is the person next to me doing right now?","options":[],"target":"SUMMARY","signal":"axis3:self"},{"id":"A3_R_SELF_PROTECT","parentId":"A3_D2","type":"reflection","text":"You absorbed something difficult so others wouldn't have to. That's not self-centeredness — that's a form of care. The distinction matters: you were in the frame alone, but others were the reason.","options":[],"target":"SUMMARY","signal":"axis3:altrocentric"},{"id":"A3_R_ALTRO_HIGH","parentId":"A3_D2","type":"reflection","text":"Today you held other people in mind — their challenges, their progress, their wellbeing. That kind of outward attention isn't separate from your own performance. It usually is your performance.","options":[],"target":"SUMMARY","signal":"axis3:altrocentric"},{"id":"A3_R_ALTRO_FRICTION","parentId":"A3_D2","type":"reflection","text":"Frustration with someone still means they were in your field of view. The question worth asking is: what was going on for them today? Not to excuse anything — but understanding someone's position often changes what's possible next.","options":[],"target":"SUMMARY","signal":"axis3:altrocentric"},{"id":"A3_R_TRANSCEND","parentId":"A3_D2","type":"reflection","text":"Keeping the end user in mind — especially when the day gets heavy — is one of the harder habits to build. When you can zoom out to that frame, the internal noise usually gets quieter. What you do becomes part of something bigger than how it felt.","options":[],"target":"SUMMARY","signal":"axis3:altrocentric"},{"id":"SUMMARY","parentId":null,"type":"summary","text":"Today you called it '{A1_OPEN.answer}'. You leaned {axis1.dominant} on agency, {axis2.dominant} on contribution, and your concern extended {axis3.dominant}. {summary_reflection}","options":[],"target":"END","signal":null,"summary_templates":{"internal_contribution_altrocentric":"You showed up with ownership, gave generously, and kept others in mind. Days like this compound — they make you someone people rely on.","internal_contribution_self":"You owned your day and contributed — both real. Tomorrow, one small move: notice someone else's day.","internal_entitlement_altrocentric":"You handled today well and kept others in mind — but some part of you was tracking the score. That tension is worth sitting with.","internal_entitlement_self":"You drove your own day — that's solid. The edge for tomorrow: shift from what the day gave you to what you gave the day.","external_contribution_altrocentric":"You gave today, and you held others in mind — even while feeling like things were out of your control. That generosity under pressure is harder than it looks.","external_contribution_self":"You contributed — that counts. The awareness that you're not fully in the driver's seat is honest. Start with one small moment tomorrow where you choose the response.","external_entitlement_self":"Today felt like things happened to you, and the return on your effort felt thin. That's a real feeling. But it's also a loop — and loops can be interrupted.","external_entitlement_altrocentric":"A harder day. You're watching what's owed while also keeping others in view — that combination creates strain. Start tomorrow with one thing you chose."}},{"id":"END","parentId":"SUMMARY","type":"end","text":"See you tomorrow.","options":[],"target":null,"signal":null}]};

// ─── Engine ───────────────────────────────────────────────
const nodeMap = {};
TREE_DATA.nodes.forEach(n => nodeMap[n.id] = n);

// Hard-wire which decision node fires after each question node
// (because decision nodes have parentId:null in the data for flexibility)
const DECISION_AFTER = {
  'A1_OPEN':          'A1_D1',
  'A1_Q_HARD':        'A1_D2',
  'A1_Q_DRIFT':       'A1_D2',
  'A1_Q_NAVIGATE':    'A1_D2',
  'A1_Q_AGENCY_HIGH': 'A1_D2',
  'A2_OPEN':          'A2_D1',
  'A2_Q_CONTRIB_HIGH':'A2_D2',
  'A2_Q_NEUTRAL':     'A2_D2',
  'A2_Q_ENTITLEMENT': 'A2_D2',
  'A3_OPEN':          'A3_D1',
  'A3_Q_SELF':        'A3_D2',
  'A3_Q_DYADIC':      'A3_D2',
  'A3_Q_TEAM':        'A3_D2',
  'A3_Q_BEYOND':      'A3_D2',
};

const state = {
  answers: {},
  signals: {},
  history: [],
  currentId: 'START'
};

function recordSignal(signal) {
  if (!signal) return;
  const [axis, pole] = signal.split(':');
  if (!state.signals[axis]) state.signals[axis] = {};
  state.signals[axis][pole] = (state.signals[axis][pole] || 0) + 1;
}

function getDominant(axis) {
  const s = state.signals[axis];
  if (!s) return 'balanced';
  const keys = Object.keys(s);
  if (!keys.length) return 'balanced';
  return keys.reduce((a, b) => s[a] >= s[b] ? a : b);
}

function interpolate(text) {
  return text.replace(/\{([^}]+)\}/g, (_, key) => {
    if (key === 'axis1.dominant') return getDominant('axis1');
    if (key === 'axis2.dominant') return getDominant('axis2');
    if (key === 'axis3.dominant') return getDominant('axis3');
    if (key === 'summary_reflection') return buildSummaryReflection();
    const dotIdx = key.indexOf('.');
    if (dotIdx > -1) {
      const nodeId = key.slice(0, dotIdx);
      const prop = key.slice(dotIdx + 1);
      if (prop === 'answer') return state.answers[nodeId] || '…';
    }
    return key;
  });
}

function buildSummaryReflection() {
  const a1 = getDominant('axis1');
  const a2 = getDominant('axis2');
  const a3 = getDominant('axis3');
  const key = `${a1}_${a2}_${a3}`;
  const node = nodeMap['SUMMARY'];
  return node.summary_templates[key] || node.summary_templates['external_entitlement_self'];
}

function resolveDecision(decisionNodeId, fromNodeId, answer) {
  const decNode = nodeMap[decisionNodeId];
  for (const rule of decNode.options) {
    // Rules end with :TARGET_ID — find the LAST colon to split
    const lastColon = rule.lastIndexOf(':');
    const conditions = rule.slice(0, lastColon);
    const target = rule.slice(lastColon + 1);
    const parts = conditions.split(',');
    let match = true;
    for (const part of parts) {
      const eqIdx = part.indexOf('=');
      const k = part.slice(0, eqIdx);
      const v = part.slice(eqIdx + 1);
      if (k === 'answer' && answer !== v) match = false;
      if (k === 'parent' && fromNodeId !== v) match = false;
    }
    if (match) return target;
  }
  return null;
}

function getNextNode(currentNode, selectedOption) {
  if (selectedOption) state.answers[currentNode.id] = selectedOption;
  if (currentNode.signal) recordSignal(currentNode.signal);
  state.history.push(currentNode.id);

  // Explicit target override
  if (currentNode.target) return currentNode.target;

  // Check if there's a decision node wired after this one
  const decisionId = DECISION_AFTER[currentNode.id];
  if (decisionId) {
    const resolved = resolveDecision(decisionId, currentNode.id, selectedOption);
    if (resolved) return resolved;
  }

  return null;
}

// ─── UI ──────────────────────────────────────────────────
const QUESTION_IDS = TREE_DATA.nodes.filter(n => n.type === 'question').map(n => n.id);
const TOTAL_STEPS = QUESTION_IDS.length;

function getAxisForNode(id) {
  if (id.startsWith('A1')) return { label: 'Axis I — Agency', color: '#8B6F3E' };
  if (id.startsWith('A2')) return { label: 'Axis II — Contribution', color: '#3A6B4A' };
  if (id.startsWith('A3')) return { label: 'Axis III — Radius', color: '#4A5A7A' };
  return null;
}

function getStepIndex() {
  const answered = QUESTION_IDS.filter(id => state.answers[id]);
  return answered.length;
}

function renderProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const pip = document.createElement('div');
    pip.className = 'progress-pip';
    const step = getStepIndex();
    if (i < step) pip.classList.add('done');
    else if (i === step) pip.classList.add('active');
    bar.appendChild(pip);
  }
}

function transition(renderFn) {
  const container = document.getElementById('nodeContainer');
  container.classList.add('fade-out');
  setTimeout(() => {
    container.classList.remove('fade-out');
    container.style.animation = 'none';
    container.offsetHeight;
    container.style.animation = '';
    renderFn();
  }, 280);
}

function advance(currentNode, selectedOption) {
  const nextId = getNextNode(currentNode, selectedOption);
  if (!nextId) return;
  state.currentId = nextId;
  const nextNode = nodeMap[nextId];
  transition(() => renderNode(nextNode));
  renderProgressBar();
}

function renderNode(node) {
  const container = document.getElementById('nodeContainer');
  container.innerHTML = '';

  if (node.type === 'start') {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <p class="node-text start-text">${node.text}</p>
      <button class="continue-btn" onclick="advance(nodeMap['${node.id}'], null)">Begin →</button>
    `;
    container.appendChild(card);
    return;
  }

  if (node.type === 'end') {
    const card = document.createElement('div');
    card.className = 'card end-screen';
    const now = new Date();
    card.innerHTML = `
      <p class="big-text">${node.text}</p>
      <p class="date-text">${now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'})}</p>
    `;
    container.appendChild(card);
    return;
  }

  if (node.type === 'bridge') {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <p class="node-type-label">—</p>
      <p class="node-text" style="font-style:italic; color:var(--ink2); font-size:1.2rem;">${node.text}</p>
    `;
    container.appendChild(card);
    setTimeout(() => advance(node, null), 2200);
    return;
  }

  if (node.type === 'reflection') {
    const axis = getAxisForNode(node.id);
    const card = document.createElement('div');
    card.className = 'card';
    let axisHtml = axis ? `<div class="axis-indicator"><div class="axis-dot" style="background:${axis.color}"></div><span class="axis-label">${axis.label}</span></div>` : '';
    card.innerHTML = `
      ${axisHtml}
      <p class="node-text reflection-text">${node.text}</p>
      <button class="continue-btn" onclick="advance(nodeMap['${node.id}'], null)">Continue →</button>
    `;
    container.appendChild(card);
    return;
  }

  if (node.type === 'summary') {
    const text = interpolate(node.text);
    const a1 = getDominant('axis1');
    const a2 = getDominant('axis2');
    const a3 = getDominant('axis3');

    const tag = (label, cls) => `<span class="signal-tag ${cls}">${label}</span>`;
    const a1Tag = a1 === 'internal' ? tag('Internal locus', 'tag-green') : tag('External locus', 'tag-amber');
    const a2Tag = a2 === 'contribution' ? tag('Contribution', 'tag-green') : tag('Entitlement', 'tag-amber');
    const a3Tag = a3 === 'altrocentric' ? tag('Altrocentric', 'tag-green') : tag('Self-centric', 'tag-neutral');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <p class="node-type-label">Session complete</p>
      <div class="signal-tags">${a1Tag}${a2Tag}${a3Tag}</div>
      <p class="summary-insight">${interpolate(buildSummaryReflection())}</p>
      <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--line);">
        <p class="node-type-label" style="margin-bottom:0.5rem;">Your path</p>
        <p style="font-size:0.95rem; color:var(--ink3); font-family:'DM Mono',monospace; line-height:1.8;">${state.answers['A1_OPEN'] || ''}</p>
      </div>
      <button class="continue-btn" style="margin-top:1.5rem;" onclick="advance(nodeMap['${node.id}'], null)">Close →</button>
    `;
    container.appendChild(card);
    return;
  }

  if (node.type === 'question') {
    const axis = getAxisForNode(node.id);
    const card = document.createElement('div');
    card.className = 'card';
    let axisHtml = axis ? `<div class="axis-indicator"><div class="axis-dot" style="background:${axis.color}"></div><span class="axis-label">${axis.label}</span></div>` : '<p class="node-type-label">Reflection</p>';

    const optionsHtml = node.options.map((opt, i) =>
      `<button class="option-btn" data-opt="${opt.replace(/"/g,'&quot;')}" onclick="selectOption(this, nodeMap['${node.id}'])">${opt}</button>`
    ).join('');

    card.innerHTML = `
      ${axisHtml}
      <p class="node-text">${node.text}</p>
      <div class="options-list">${optionsHtml}</div>
    `;
    container.appendChild(card);
    return;
  }
}

function selectOption(btn, node) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const opt = btn.dataset.opt;
  setTimeout(() => advance(node, opt), 340);
}

// ─── Init ─────────────────────────────────────────────────
renderProgressBar();
renderNode(nodeMap['START']);
</script>
